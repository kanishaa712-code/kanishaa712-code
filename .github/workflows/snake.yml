name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # roz raat 12 baje (UTC) automatically chalega
  workflow_dispatch: {}     # manually bhi "Run workflow" button se chala sakte hain
  push:
    branches:
      - main               # jab bhi main branch pe push ho

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pink-snake.svg
            dist/pink-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
